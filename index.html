<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golden Fragrance | Private Collection</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="video-container">
        <video autoplay muted loop playsinline id="bg-video">
            <source src="assets/borrifador.mp4" type="video/mp4">
        </video>
    </div>

    <div class="main-overlay">
        <header>
            <h1 class="premium-logo">GOLDEN FRAGRANCE</h1>
            <p class="access-status">ACESSO PRIVADO // STATUS: ELITE</p>
        </header>

        <section class="card-grid">
            <div class="luxury-card">
                <div class="visual-area">
                    <video autoplay muted loop playsinline src="assets/frasco.mp4"></video>
                </div>
                <div class="card-content">
                    <span class="label">COLEÇÃO PRIVADA</span>
                    <h3>NOIR ESSENCE</h3>
                    <p>A fragrância que define sua autoridade.</p>
                    <a href="https://www.amazon.com.br/dp/B0DZTZYF4?tag=roger7927-20" class="btn-purchase">ADQUIRA O SEU</a>
                </div>
            </div>
        </section>

        <footer>
            <p>// (c) 2026 Guillermo Roger Hernandez Chandia - ADS</p>
        </footer>
    </div>
</body>
</html>
